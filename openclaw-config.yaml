# Sample OpenClaw deployment configuration for STMClaw.
# Replace the runtime section below with the syntax your OpenClaw version expects.

runtime:
  working_directory: .
  python_executable: .\stmclaw-env\Scripts\python.exe
  environment:
    GEMINI_API_KEY: "${GEMINI_API_KEY}"
    CROSSREF_EMAIL: "${CROSSREF_EMAIL}"
    MOLECULE_MATCH_ENABLED: "1"
    STMCLAW_NAVIGATION_INSTRUCTION: "The scan shall start from the top-left and proceed in a serpentine pattern."

scan_engine:
  module: openclaw_adapter
  entrypoint: run_stmclaw
  args: []
  timeout_seconds: 3600

# Notes:
# - OpenClaw should launch this repository from its root folder.
# - The adapter file is a minimal bridge; production deployment may need
#   additional hooks for session lifecycle, retry handling, and structured logging.
